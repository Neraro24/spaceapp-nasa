<!DOCTYPE html>
<html>
<head>
  <title>Lunar Drift</title>

  <style>
    body { margin:0; overflow:hidden; background:black; font-family:Arial; }

    #title {
      position:absolute;
      top:10px;
      width:100%;
      text-align:center;
      color:white;
      font-size:30px;
      letter-spacing:2px;
    }

    #menu {
      position:absolute;
      top:20px;
      right:20px;
      color:white;
    }

    #dropdown {
      display:none;
      background:rgba(0,0,0,0.85);
      padding:12px;
      border-radius:10px;
    }

    #dropdown p { cursor:pointer; margin:6px 0; }

    /* BIGGER DATA PANEL */
    #dataPanel {
      position:absolute;
      left:20px;
      top:20px;
      background:rgba(0,0,0,0.85);
      padding:16px;
      border-radius:12px;
      color:white;
      width:260px;
      box-shadow:0 0 15px rgba(0,150,255,0.3);
    }

    #dataPanel h3 {
      margin-top:0;
      color:#00ccff;
    }

  </style>
</head>

<body>

<div id="title">🌕 Lunar Drift</div>

<div id="menu">
  <button onclick="toggleMenu()">☰ Data</button>
  <div id="dropdown">
    <p onclick="selectData('flood')">Flood</p>
    <p onclick="selectData('heatwaves')">Heatwaves</p>
  </div>
</div>

<div id="dataPanel">
  <h3>🌍 Earth Data</h3>
  <p id="location">Location: --</p>
  <p id="temp">Temp: --</p>
  <p id="risk">Risk: --</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.z = 3;

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff,2);
light.position.set(5,3,5);
scene.add(light);

// STARS
const starsGeo = new THREE.BufferGeometry();
const starVerts = [];
for(let i=0;i<5000;i++){
  starVerts.push((Math.random()-0.5)*2000);
  starVerts.push((Math.random()-0.5)*2000);
  starVerts.push((Math.random()-0.5)*2000);
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts,3));
scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({size:1})));

// EARTH
const loader = new THREE.TextureLoader();
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1,128,128),
  new THREE.MeshStandardMaterial({
    map: loader.load('https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg')
  })
);
scene.add(earth);

// CLOUDS
const clouds = new THREE.Mesh(
  new THREE.SphereGeometry(1.01,128,128),
  new THREE.MeshStandardMaterial({
    map: loader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png'),
    transparent:true
  })
);
scene.add(clouds);

// 🌊 FLOOD WAVE (THIN + SMOOTH)
const floodGeo = new THREE.SphereGeometry(1.03,128,128);
const floodMat = new THREE.MeshBasicMaterial({
  color:0x00ccff,
  transparent:true,
  opacity:0.4,
  wireframe:false
});
const floodLayer = new THREE.Mesh(floodGeo,floodMat);
floodLayer.visible = false;
scene.add(floodLayer);

// 🔥 HEAT WAVE
const heatGeo = new THREE.SphereGeometry(1.03,128,128);
const heatMat = new THREE.MeshBasicMaterial({
  color:0xff6600,
  transparent:true,
  opacity:0.4
});
const heatLayer = new THREE.Mesh(heatGeo,heatMat);
heatLayer.visible = false;
scene.add(heatLayer);

// ===== RAYCAST =====
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("mousemove",(e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
});

// CLICK ANYWHERE → DATA
window.addEventListener("click",()=>{
  raycaster.setFromCamera(mouse,camera);
  const hit = raycaster.intersectObject(earth);

  if(hit.length>0){
    const p = hit[0].point;

    const lat = (Math.asin(p.y)).toFixed(2);
    const lon = (Math.atan2(p.x,p.z)).toFixed(2);

    showData(lat,lon);
  }
});

// FAKE/REAL DATA
function showData(lat,lon){
  document.getElementById("location").innerText = `Lat: ${lat}, Lon: ${lon}`;
  document.getElementById("temp").innerText = `Temp: ${(25+Math.random()*15).toFixed(1)}°C`;
  document.getElementById("risk").innerText = `Risk: ${["Low","Medium","High"][Math.floor(Math.random()*3)]}`;
}

// MENU
function toggleMenu(){
  const m = document.getElementById("dropdown");
  m.style.display = m.style.display==="block"?"none":"block";
}

function selectData(type){
  floodLayer.visible=false;
  heatLayer.visible=false;

  if(type==="flood") floodLayer.visible=true;
  if(type==="heatwaves") heatLayer.visible=true;
}

// 🌊 SMOOTH WAVE FUNCTION (NO DISTORT BREAKING)
function animateWave(mesh,time){
  const pos = mesh.geometry.attributes.position;

  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i);
    const y = pos.getY(i);
    const z = pos.getZ(i);

    const wave = Math.sin(time + x*3 + y*3 + z*3)*0.01;

    pos.setXYZ(i, x*(1+wave), y*(1+wave), z*(1+wave));
  }

  pos.needsUpdate = true;
}

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;
  clouds.rotation.y += 0.0025;

  const t = Date.now()*0.002;

  if(floodLayer.visible) animateWave(floodLayer,t);
  if(heatLayer.visible) animateWave(heatLayer,t*1.5);

  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
