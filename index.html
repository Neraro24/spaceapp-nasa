<!DOCTYPE html>
<html>
<head>
  <title>NASA Lunar Game Engine</title>

  <style>
    body { margin:0; overflow:hidden; background:black; font-family:Arial; }

    #ui{
      position:absolute;
      width:100%;
      height:100%;
      color:white;
      pointer-events:none;
    }

    #panel{
      position:absolute;
      left:20px;
      top:20px;
      background:rgba(0,0,0,0.7);
      padding:12px;
      width:280px;
      border-radius:10px;
    }

    #ai{
      position:absolute;
      bottom:20px;
      left:20px;
      width:300px;
      background:rgba(0,0,0,0.7);
      padding:10px;
      border-radius:10px;
    }

    #crosshair{
      position:absolute;
      top:50%;
      left:50%;
      width:6px;
      height:6px;
      background:white;
      border-radius:50%;
      transform:translate(-50%,-50%);
    }
  </style>
</head>

<body>

<div id="ui">
  <div id="panel">
    <div id="mode">Mode: EARTH</div>
    <div id="mission">Mission: None</div>
    <div id="status">Status: Idle</div>
  </div>

  <div id="ai">
    🤖 AI: Initializing...
    <div id="chat"></div>
  </div>

  <div id="crosshair"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ================= STATE ENGINE =================
let state = {
  mode: "earth",
  mission: null,
  aliens: [],
  kills: 0,
  roomCode: null,
  players: []
};

// ================= SCENE =================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,1,3);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.DirectionalLight(0xffffff,1.5).position.set(5,5,5));

// ================= MOON =================
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(5,128,128),
  new THREE.MeshStandardMaterial({color:0x888888})
);
scene.add(moon);

// ================= SHIPS =================
const apollo = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5),new THREE.MeshStandardMaterial({color:0x999999}));
apollo.position.set(1,0.5,1);
scene.add(apollo);

const shuttle = new THREE.Mesh(new THREE.ConeGeometry(0.4,1,8),new THREE.MeshStandardMaterial({color:0x00aaff}));
shuttle.position.set(-1,0.5,0);
scene.add(shuttle);

const orion = new THREE.Mesh(new THREE.SphereGeometry(0.5,16,16),new THREE.MeshStandardMaterial({color:0xff3300}));
orion.position.set(0,0.5,-2);
scene.add(orion);

// ================= AI SYSTEM =================
function AI(msg){
  const chat = document.getElementById("chat");
  chat.innerHTML += "<p>"+msg+"</p>";
}

// ================= GAME LOGIC =================
function setMission(m){
  state.mission = m;
  document.getElementById("mission").innerText = "Mission: "+m;

  if(m==="ORION"){
    spawnAliens();
    AI("Survive! Eliminate all alien threats.");
  }

  if(m==="SHUTTLE"){
    state.roomCode = Math.floor(Math.random()*90000+10000);
    state.players = ["You","PlayerA","PlayerB"];
    AI("Multiplayer room created: "+state.roomCode);
  }

  if(m==="APOLLO"){
    AI("Take Earth photos. Educational mode enabled.");
  }
}

// ================= ALIENS =================
function spawnAliens(){
  state.aliens = [];

  for(let i=0;i<5;i++){
    const alien = new THREE.Mesh(
      new THREE.SphereGeometry(0.2,8,8),
      new THREE.MeshBasicMaterial({color:0x00ff00})
    );

    alien.position.set(
      (Math.random()-0.5)*5,
      0.5,
      (Math.random()-0.5)*5
    );

    scene.add(alien);
    state.aliens.push(alien);
  }
}

// click kill system
document.addEventListener("click",()=>{
  if(state.mission==="ORION"){
    raycaster.setFromCamera(mouse,camera);
    const hits = raycaster.intersectObjects(state.aliens);

    if(hits.length>0){
      const alien = hits[0].object;
      scene.remove(alien);
      state.aliens = state.aliens.filter(a=>a!==alien);
      state.kills++;

      AI("Alien eliminated. Total: "+state.kills);

      if(state.aliens.length===0){
        AI("MISSION COMPLETE ✔");
      }
    }
  }

  // ship selection
  raycaster.setFromCamera(mouse,camera);
  const hit = raycaster.intersectObjects([apollo,shuttle,orion]);

  if(hit.length>0){
    if(hit[0].object===apollo){
      setMission("APOLLO");
    }
    if(hit[0].object===shuttle){
      setMission("SHUTTLE");
    }
    if(hit[0].object===orion){
      setMission("ORION");
    }
  }
});

// ================= FPS MOVEMENT =================
let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

let yaw=0,pitch=0;
document.addEventListener("mousemove",(e)=>{
  yaw -= e.movementX*0.002;
  pitch -= e.movementY*0.002;
  pitch=Math.max(-1.2,Math.min(1.2,pitch));
});

function move(){
  const speed=0.05;

  if(keys["w"]) camera.position.z -= Math.cos(yaw)*speed;
  if(keys["s"]) camera.position.z += Math.cos(yaw)*speed;
  if(keys["a"]) camera.position.x -= Math.sin(yaw)*speed;
  if(keys["d"]) camera.position.x += Math.sin(yaw)*speed;

  camera.rotation.y=yaw;
  camera.rotation.x=pitch;
}

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  move();

  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
