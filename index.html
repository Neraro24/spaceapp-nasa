<!DOCTYPE html>
<html>
<head>
  <title>Lunar Drift</title>

  <style>
    body { margin:0; overflow:hidden; background:black; font-family:Arial; }

    #title {
      position:absolute;
      top:10px;
      width:100%;
      text-align:center;
      color:white;
      font-size:28px;
    }

    #menu {
      position:absolute;
      top:20px;
      right:20px;
      color:white;
    }

    #dropdown {
      display:none;
      background:rgba(0,0,0,0.8);
      padding:10px;
      border-radius:10px;
    }

    #dropdown p { cursor:pointer; margin:5px 0; }

    #layersPanel {
      display:none;
      position:absolute;
      top:100px;
      right:20px;
      background:rgba(0,0,0,0.85);
      padding:12px;
      border-radius:10px;
      width:220px;
      color:white;
    }

    #tooltip {
      position:absolute;
      background:rgba(0,0,0,0.7);
      color:white;
      padding:5px;
      border-radius:5px;
      display:none;
    }

    #dataPanel {
      position:absolute;
      left:20px;
      top:20px;
      background:rgba(0,0,0,0.8);
      padding:12px;
      border-radius:10px;
      color:white;
      width:200px;
    }
  </style>
</head>

<body>

<div id="title">🌕 Lunar Drift</div>

<div id="menu">
  <button onclick="toggleMenu()">☰ Data</button>
  <div id="dropdown">
    <p onclick="selectData('flood')">Flood</p>
    <p onclick="selectData('heatwaves')">Heatwaves</p>
    <hr>
    <p onclick="toggleLayers()">🧱 Layers</p>
  </div>
</div>

<div id="layersPanel">
  <p onclick="showLayer('crust')">Crust</p>
  <p onclick="showLayer('mantle')">Mantle</p>
  <p onclick="showLayer('outer core')">Outer Core</p>
  <p onclick="showLayer('inner core')">Inner Core</p>
</div>

<div id="tooltip"></div>

<div id="dataPanel">
  <h3>🌍 Region Data</h3>
  <p id="temp">Temp: --</p>
  <p id="risk">Risk: --</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// BASIC SETUP
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.PointLight(0xffffff,2);
light.position.set(5,3,5);
scene.add(light);

const loader = new THREE.TextureLoader();

// EARTH
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1,64,64),
  new THREE.MeshStandardMaterial({
    map: loader.load('https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg')
  })
);
scene.add(earth);

// CLOUDS
const clouds = new THREE.Mesh(
  new THREE.SphereGeometry(1.01,64,64),
  new THREE.MeshStandardMaterial({
    map: loader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png'),
    transparent:true
  })
);
scene.add(clouds);

// FLOOD
const floodLayer = new THREE.Mesh(
  new THREE.SphereGeometry(1.05,64,64),
  new THREE.MeshBasicMaterial({color:0x00ccff,transparent:true,opacity:0.3})
);
floodLayer.visible=false;
scene.add(floodLayer);

// HEAT
const heatLayer = new THREE.Mesh(
  new THREE.SphereGeometry(1.05,64,64),
  new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0.3})
);
heatLayer.visible=false;
scene.add(heatLayer);

// RAYCASTER (CLICK + HOVER)
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("mousemove",(e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  const intersects = raycaster.intersectObject(earth);

  const tooltip = document.getElementById("tooltip");

  if(intersects.length>0){
    tooltip.style.display="block";
    tooltip.style.left = e.clientX+"px";
    tooltip.style.top = e.clientY+"px";
    tooltip.innerHTML="🌍 Earth Surface";
  } else {
    tooltip.style.display="none";
  }
});

// CLICK → ZOOM + DATA
window.addEventListener("click",()=>{
  raycaster.setFromCamera(mouse,camera);
  const intersects = raycaster.intersectObject(earth);

  if(intersects.length>0){
    zoomToEarth();
    showFakeData();
  }
});

// CAMERA ZOOM
function zoomToEarth(){
  let target = 1.5;
  let interval = setInterval(()=>{
    camera.position.z -= 0.05;
    if(camera.position.z <= target) clearInterval(interval);
  },16);
}

// FAKE DATA
function showFakeData(){
  document.getElementById("temp").innerText = "Temp: " + (30+Math.random()*10).toFixed(1)+"°C";
  document.getElementById("risk").innerText = "Risk: " + ["Low","Medium","High"][Math.floor(Math.random()*3)];
}

// MENU
function toggleMenu(){
  const m = document.getElementById("dropdown");
  m.style.display = m.style.display==="block"?"none":"block";
}

function toggleLayers(){
  const p = document.getElementById("layersPanel");
  p.style.display = p.style.display==="block"?"none":"block";
}

function selectData(type){
  floodLayer.visible=false;
  heatLayer.visible=false;

  if(type==="flood") floodLayer.visible=true;
  if(type==="heatwaves") heatLayer.visible=true;
}

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;
  clouds.rotation.y += 0.0025;

  // animate layers
  if(floodLayer.visible){
    floodLayer.material.opacity = 0.2 + Math.sin(Date.now()*0.003)*0.1;
  }

  if(heatLayer.visible){
    heatLayer.material.opacity = 0.2 + Math.sin(Date.now()*0.005)*0.15;
  }

  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
