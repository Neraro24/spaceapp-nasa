<!DOCTYPE html>
<html>
<head>
  <title>NASA Unified Space System FIXED</title>

  <style>
    body { margin:0; overflow:hidden; background:black; font-family:Arial; }

    #title{
      position:absolute;
      top:10px;
      width:100%;
      text-align:center;
      color:white;
      font-size:24px;
      z-index:10;
    }

    #panel{
      position:absolute;
      left:20px;
      top:20px;
      background:rgba(0,0,0,0.7);
      padding:12px;
      color:white;
      width:280px;
      border-radius:10px;
      z-index:10;
    }

    #menu{
      position:absolute;
      right:20px;
      top:20px;
      z-index:10;
      color:white;
    }

    #dropdown{
      display:none;
      background:rgba(0,0,0,0.85);
      padding:10px;
      border-radius:10px;
    }

    #crosshair{
      position:absolute;
      top:50%;
      left:50%;
      width:6px;
      height:6px;
      background:white;
      border-radius:50%;
      transform:translate(-50%,-50%);
      display:none;
    }
  </style>
</head>

<body>

<div id="title">🚀 NASA Unified Space System</div>

<div id="panel">
  <div id="mode">Mode: EARTH</div>
  <div id="info">Earth Active</div>
  <div id="mission">Mission: None</div>
</div>

<div id="menu">
  <button onclick="toggleMenu()">☰ System</button>
  <div id="dropdown">
    <p onclick="selectLayer('flood')">🌊 Flood</p>
    <p onclick="selectLayer('heat')">🔥 Heat</p>
    <p onclick="selectLayer('quake')">🌎 Quake</p>
    <p onclick="switchToMoon()">🌕 Enter Moon</p>
    <p onclick="switchToEarth()">🌍 Return Earth</p>
  </div>
</div>

<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ================= SCENE =================
const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,0,3);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light=new THREE.DirectionalLight(0xffffff,1.5);
light.position.set(5,5,5);
scene.add(light);

// ================= TEXTURE LOADER =================
const loader=new THREE.TextureLoader();

// ================= EARTH (FIXED POSITION) =================
const earth=new THREE.Mesh(
  new THREE.SphereGeometry(1,128,128),
  new THREE.MeshStandardMaterial({
    map:loader.load("https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg")
  })
);
earth.position.set(0,0,0);
scene.add(earth);

// CLOUDS
const clouds=new THREE.Mesh(
  new THREE.SphereGeometry(1.01,128,128),
  new THREE.MeshStandardMaterial({
    map:loader.load("https://threejs.org/examples/textures/planets/earth_clouds_1024.png"),
    transparent:true
  })
);
scene.add(clouds);

// ================= MOON (FIXED POSITION + SCALE) =================
const moon=new THREE.Mesh(
  new THREE.SphereGeometry(0.35,128,128),
  new THREE.MeshStandardMaterial({
    color:0x888888
  })
);
moon.position.set(2.5,0,0);
scene.add(moon);

// ================= LAYERS =================
function makeLayer(color){
  const m=new THREE.Mesh(
    new THREE.SphereGeometry(1.02,128,128),
    new THREE.MeshBasicMaterial({
      color:color,
      transparent:true,
      opacity:0.15
    })
  );
  m.visible=false;
  scene.add(m);
  return m;
}

const flood=makeLayer(0x00aaff);
const heat=makeLayer(0xff3300);
const quake=makeLayer(0xc49a6c);

// ================= SHIPS =================
const apollo=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4),new THREE.MeshStandardMaterial({color:0x999999}));
const shuttle=new THREE.Mesh(new THREE.ConeGeometry(0.3,0.8,8),new THREE.MeshStandardMaterial({color:0x00aaff}));
const orion=new THREE.Mesh(new THREE.SphereGeometry(0.3,16,16),new THREE.MeshStandardMaterial({color:0xff3300}));

apollo.visible=shuttle.visible=orion.visible=false;
scene.add(apollo,shuttle,orion);

// ================= MENU =================
function toggleMenu(){
  const d=document.getElementById("dropdown");
  d.style.display=d.style.display==="block"?"none":"block";
}

// ================= MODE SWITCH =================
function switchToMoon(){
  document.getElementById("mode").innerText="Mode: MOON";

  earth.visible=false;
  clouds.visible=false;

  flood.visible=heat.visible=quake.visible=false;

  moon.visible=true;
  apollo.visible=shuttle.visible=orion.visible=true;

  apollo.position.set(1,0,0);
  shuttle.position.set(-1,0,0);
  orion.position.set(0,0,-1);

  camera.position.set(0,0.5,2.5);

  document.getElementById("crosshair").style.display="block";
}

function switchToEarth(){
  document.getElementById("mode").innerText="Mode: EARTH";

  earth.visible=true;
  clouds.visible=true;

  moon.visible=true;

  apollo.visible=shuttle.visible=orion.visible=false;

  camera.position.set(0,0,3);

  document.getElementById("crosshair").style.display="none";
}

// ================= LAYERS =================
function selectLayer(t){
  flood.visible=heat.visible=quake.visible=false;

  if(t==="flood") flood.visible=true;
  if(t==="heat") heat.visible=true;
  if(t==="quake") quake.visible=true;
}

// ================= RENDER LOOP =================
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y+=0.002;
  clouds.rotation.y+=0.0025;
  moon.rotation.y+=0.001;

  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
