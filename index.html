<!DOCTYPE html>
<html>
<head>
  <title>Earth</title>

  <style>
    #menu {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-family: Arial;
    }

    #dropdown {
      display: none;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 10px;
    }

    #dropdown p {
      cursor: pointer;
      margin: 5px 0;
    }
  </style>

</head>

<body style="margin:0;">

<!-- UI MENU -->
<div id="menu">
  <button onclick="toggleMenu()">☰ Data</button>

  <div id="dropdown">
    <p onclick="selectData('flood')">Flood</p>
    <p onclick="selectData('global warming')">Global Warming</p>
    <p onclick="selectData('climate')">Climate</p>
    <p onclick="selectData('heatwaves')">Heatwaves</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 3;

// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5, 3, 5);
scene.add(light);

// TEXTURE LOADER
const loader = new THREE.TextureLoader();

// EARTH TEXTURE
const earthTexture = loader.load(
  'https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg'
);

// EARTH
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  new THREE.MeshStandardMaterial({ map: earthTexture })
);
scene.add(earth);

// CLOUDS
const cloudTexture = loader.load(
  'https://threejs.org/examples/textures/planets/earth_clouds_1024.png'
);

const clouds = new THREE.Mesh(
  new THREE.SphereGeometry(1.01, 64, 64),
  new THREE.MeshStandardMaterial({
    map: cloudTexture,
    transparent: true
  })
);
scene.add(clouds);

// GLOW
const glow = new THREE.Mesh(
  new THREE.SphereGeometry(1.1, 64, 64),
  new THREE.MeshBasicMaterial({
    color: 0x00aaff,
    transparent: true,
    opacity: 0.2
  })
);
scene.add(glow);

// MENU FUNCTIONS
function toggleMenu() {
  const menu = document.getElementById("dropdown");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function selectData(type) {
  alert("Showing data for: " + type);
}

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;
  clouds.rotation.y += 0.0025;

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Earth (WebGPU)</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>

  <!-- IMPORT MAP -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.webgpu.js",
      "three/tsl": "https://unpkg.com/three@0.160.0/build/three.tsl.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { MeshStandardNodeMaterial, texture, uv } from 'three/tsl';

// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 3);

// RENDERER (WEBGPU)
const renderer = new THREE.WebGPURenderer({ antialias: true });
await renderer.init();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLS
const controls = new OrbitControls(camera, renderer.domElement);

// LIGHTS
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5, 3, 5);
scene.add(light);

// TEXTURES
const loader = new THREE.TextureLoader();

const earthMap = loader.load(
  'https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg'
);

const nightMap = loader.load(
  'https://threejs.org/examples/textures/planets/earth_at_night_2048.jpg'
);

// 🌍 MATERIAL USING TSL
const material = new MeshStandardNodeMaterial();

// DAY TEXTURE
const day = texture(earthMap, uv());

// NIGHT GLOW
const night = texture(nightMap, uv());

// MIX DAY + NIGHT
material.colorNode = day.add(night.mul(0.3));

// EARTH
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 128, 128),
  material
);
scene.add(earth);

// 🌫️ ATMOSPHERE GLOW
const atmosphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.1, 128, 128),
  new THREE.MeshBasicMaterial({
    color: 0x3399ff,
    transparent: true,
    opacity: 0.2
  })
);
scene.add(atmosphere);

// 🌌 STARS
const starsGeometry = new THREE.BufferGeometry();
const starsMaterial = new THREE.PointsMaterial();

const vertices = [];
for (let i = 0; i < 10000; i++) {
  vertices.push(
    (Math.random()-0.5)*2000,
    (Math.random()-0.5)*2000,
    (Math.random()-0.5)*2000
  );
}
starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
scene.add(new THREE.Points(starsGeometry, starsMaterial));

// ANIMATION
function animate() {
  earth.rotation.y += 0.002;
  atmosphere.rotation.y += 0.002;

  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);

// RESIZE
window.addEventListener("resize", () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

</script>

</body>
</html>
