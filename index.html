<!DOCTYPE html>
<html>
<head>
  <title>Test 3D</title>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// simple cube (TEST OBJECT)
const geometry = new THREE.BoxGeometry();
const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

camera.position.z = 3;

function animate() {
  requestAnimationFrame(animate);
  cube.rotation.x += 0.01;
  cube.rotation.y += 0.01;
  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html><!DOCTYPE html>
<html>
<head>
  <title>Earth Project</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('bg'),
});

renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.z = 3;

// Earth
const geometry = new THREE.SphereGeometry(1, 32, 32);

const texture = new THREE.TextureLoader().load(
  'https://threejs.org/examples/textures/earth_atmos_2048.jpg'
);

const material = new THREE.MeshBasicMaterial({ map: texture });

const earth = new THREE.Mesh(geometry, material);
scene.add(earth);

// Moon
const moonGeometry = new THREE.SphereGeometry(0.3, 32, 32);
const moonMaterial = new THREE.MeshBasicMaterial({ color: 0xaaaaaa });

const moon = new THREE.Mesh(moonGeometry, moonMaterial);
scene.add(moon);

let angle = 0;

// Click detection
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObject(moon);

  if (intersects.length > 0) {
    alert("Entering Moon 🌕");
  }
});

// Animation
function animate() {
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;

  angle += 0.01;
  moon.position.x = Math.cos(angle) * 2;
  moon.position.z = Math.sin(angle) * 2;

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
