<!DOCTYPE html>
<html>
<head>
  <title>Earth</title>

  <style>
    body { margin:0; overflow:hidden; background:black; }

    /* TOP TITLE */
    #title {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 28px;
      font-family: Arial;
      letter-spacing: 2px;
    }

    /* MENU */
    #menu {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-family: Arial;
    }

    #dropdown {
      display: none;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 10px;
    }

    #dropdown p {
      cursor: pointer;
      margin: 5px 0;
    }

    /* LAYERS PANEL */
    #layersPanel {
      display: none;
      position: absolute;
      top: 100px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      padding: 12px;
      border-radius: 10px;
      color: white;
      font-family: Arial;
      width: 220px;
    }

    #layersPanel p {
      margin: 6px 0;
      cursor: pointer;
    }

  </style>

</head>

<body>

<!-- TITLE -->
<div id="title">🌕 Lunar Drift</div>

<!-- MENU -->
<div id="menu">
  <button onclick="toggleMenu()">☰ Data</button>

  <div id="dropdown">
    <p onclick="selectData('flood')">Flood</p>
    <p onclick="selectData('global warming')">Global Warming</p>
    <p onclick="selectData('climate')">Climate</p>
    <p onclick="selectData('heatwaves')">Heatwaves</p>

    <!-- NEW BUTTON -->
    <hr>
    <p onclick="toggleLayers()">🧱 Layers</p>
  </div>
</div>

<!-- LAYERS PANEL -->
<div id="layersPanel">
  <p onclick="showLayer('crust')">Crust</p>
  <p onclick="showLayer('mantle')">Mantle</p>
  <p onclick="showLayer('outer core')">Outer Core</p>
  <p onclick="showLayer('inner core')">Inner Core</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 3;

// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5, 3, 5);
scene.add(light);

// TEXTURE LOADER
const loader = new THREE.TextureLoader();

// EARTH TEXTURE
const earthTexture = loader.load(
  'https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg'
);

// EARTH
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  new THREE.MeshStandardMaterial({ map: earthTexture })
);
scene.add(earth);

// CLOUDS
const cloudTexture = loader.load(
  'https://threejs.org/examples/textures/planets/earth_clouds_1024.png'
);

const clouds = new THREE.Mesh(
  new THREE.SphereGeometry(1.01, 64, 64),
  new THREE.MeshStandardMaterial({
    map: cloudTexture,
    transparent: true
  })
);
scene.add(clouds);

// GLOW
const glow = new THREE.Mesh(
  new THREE.SphereGeometry(1.1, 64, 64),
  new THREE.MeshBasicMaterial({
    color: 0x00aaff,
    transparent: true,
    opacity: 0.2
  })
);
scene.add(glow);

// 🌊 FLOOD LAYER
const floodLayer = new THREE.Mesh(
  new THREE.SphereGeometry(1.05, 64, 64),
  new THREE.MeshBasicMaterial({
    color: 0x00ccff,
    transparent: true,
    opacity: 0.3
  })
);
floodLayer.visible = false;
scene.add(floodLayer);

// 🔥 HEAT LAYER
const heatLayer = new THREE.Mesh(
  new THREE.SphereGeometry(1.05, 64, 64),
  new THREE.MeshBasicMaterial({
    color: 0xff6600,
    transparent: true,
    opacity: 0.3
  })
);
heatLayer.visible = false;
scene.add(heatLayer);

// 🧱 EARTH INTERNAL LAYERS
const crust = new THREE.Mesh(
  new THREE.SphereGeometry(1.02, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true })
);
const mantle = new THREE.Mesh(
  new THREE.SphereGeometry(0.85, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0xff9933, wireframe: true })
);
const outerCore = new THREE.Mesh(
  new THREE.SphereGeometry(0.6, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0xff3300, wireframe: true })
);
const innerCore = new THREE.Mesh(
  new THREE.SphereGeometry(0.3, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true })
);

crust.visible = false;
mantle.visible = false;
outerCore.visible = false;
innerCore.visible = false;

scene.add(crust, mantle, outerCore, innerCore);

// MENU FUNCTIONS
function toggleMenu() {
  const menu = document.getElementById("dropdown");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function toggleLayers() {
  const panel = document.getElementById("layersPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

// DATA SELECT
function selectData(type) {
  floodLayer.visible = false;
  heatLayer.visible = false;

  if (type === "flood") floodLayer.visible = true;
  if (type === "heatwaves") heatLayer.visible = true;

  alert("Showing data for: " + type);
}

// LAYER SELECT
function showLayer(type) {
  crust.visible = false;
  mantle.visible = false;
  outerCore.visible = false;
  innerCore.visible = false;

  if (type === "crust") crust.visible = true;
  if (type === "mantle") mantle.visible = true;
  if (type === "outer core") outerCore.visible = true;
  if (type === "inner core") innerCore.visible = true;
}

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;
  clouds.rotation.y += 0.0025;

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
