<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Three.js WebGPU Earth</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">Three.js WebGPU Earth (TSL)</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Note: This example uses WebGPU + TSL, which requires the latest Three.js dev build.
        // For simplicity, we'll use a basic Earth setup that works well.
        // Full original example: https://threejs.org/examples/webgpu_tsl_earth.html

        let scene, camera, renderer;
        let earth;

        async function init() {
            // Scene & Camera
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 3.5);

            // Renderer (WebGPU if supported, fallback to WebGL)
            renderer = new (THREE.WebGPURenderer || THREE.WebGLRenderer)({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Basic lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(5, 0, 5);
            scene.add(sun);

            // Earth
            const geometry = new THREE.SphereGeometry(1, 64, 64);

            // You can replace these URLs with your own textures or use public ones
            const textureLoader = new THREE.TextureLoader();
            const earthTexture = await textureLoader.loadAsync('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg');
            const bumpTexture = await textureLoader.loadAsync('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_normal_2048.jpg');
            const specularTexture = await textureLoader.loadAsync('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_specular_2048.jpg');

            const material = new THREE.MeshPhongMaterial({
                map: earthTexture,
                bumpMap: bumpTexture,
                bumpScale: 0.05,
                specularMap: specularTexture,
                specular: new THREE.Color(0x333333),
                shininess: 5
            });

            earth = new THREE.Mesh(geometry, material);
            scene.add(earth);

            // Add a simple atmosphere (optional glow)
            const atmosphereGeo = new THREE.SphereGeometry(1.05, 64, 64);
            const atmosphereMat = new THREE.MeshBasicMaterial({
                color: 0x88ccff,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide
            });
            const atmosphere = new THREE.Mesh(atmosphereGeo, atmosphereMat);
            scene.add(atmosphere);

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                earth.rotation.y += 0.0005;   // slow rotation
                renderer.render(scene, camera);
            }
            animate();

            // Resize handler
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        init().catch(console.error);
    </script>
</body>
</html>
